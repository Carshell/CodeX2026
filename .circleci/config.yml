version: 2.1

jobs:
  go-unit-tests:
    docker:
      - image: cimg/go:1.25.0
    working_directory: ~/project
    steps:
      - checkout
      - run:
          name: Run Go unit tests
          command: |
            set -euo pipefail
            for GO_PACKAGE in "shippingservice" "productcatalogservice" "frontend/validator" "frontend/money"; do
              echo "Testing src/${GO_PACKAGE}"
              pushd "src/${GO_PACKAGE}"
              go test ./...
              popd
            done

  dotnet-unit-tests:
    docker:
      - image: mcr.microsoft.com/dotnet/sdk:10.0
    working_directory: ~/project
    steps:
      - run:
          name: Install git for checkout
          command: |
            set -euo pipefail
            apt-get update
            apt-get install -y git
      - checkout
      - run:
          name: Run C# unit tests
          command: |
            set -euo pipefail
            dotnet --info
            dotnet test src/cartservice/cartservice.sln --configuration Release

  kustomize-build:
    docker:
      - image: cimg/base:stable
    working_directory: ~/project
    steps:
      - checkout
      - run:
          name: Install kustomize
          command: |
            set -euo pipefail
            if command -v kustomize >/dev/null 2>&1; then
              kustomize version
              exit 0
            fi

            KUSTOMIZE_VERSION="v5.7.1"
            curl -fsSL \
              "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2F${KUSTOMIZE_VERSION}/kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz" \
              -o /tmp/kustomize.tar.gz
            sudo tar -xzf /tmp/kustomize.tar.gz -C /usr/local/bin kustomize
            kustomize version
      - run:
          name: Validate Kustomize manifests
          command: |
            set -euo pipefail
            kustomize build kubernetes-manifests >/dev/null
            kustomize build kustomize >/dev/null
            kustomize build deploy/argocd >/dev/null
            for test in kustomize/tests/*/; do
              echo "Building ${test}"
              kustomize build "${test}" >/dev/null
            done

  build-and-open-gitops-pr:
    docker:
      - image: cimg/base:stable
    working_directory: ~/project
    environment:
      GAR_REPOSITORY: microservices-demo
      GITOPS_TARGET_BRANCH: main
    steps:
      - checkout
      - run:
          name: Skip promotion-only commits (loop guard)
          command: |
            set -euo pipefail

            CHANGED_FILES="$(git show --name-only --pretty=format: "${CIRCLE_SHA1}" | sed '/^$/d' | sort -u)"
            echo "Changed files in ${CIRCLE_SHA1}:"
            echo "${CHANGED_FILES}"

            NON_PROMOTION_FILES="$(echo "${CHANGED_FILES}" | grep -vE '^deploy/overlays/(dev|staging|prod)/kustomization\.yaml$' || true)"

            if [ -n "${CHANGED_FILES}" ] && [ -z "${NON_PROMOTION_FILES}" ]; then
              echo "Promotion-only commit detected; halting this job to avoid PR recursion."
              circleci-agent step halt
            fi
      - setup_remote_docker
      - run:
          name: Validate required env vars
          command: |
            set -euo pipefail
            required=(GOOGLE_CREDENTIALS GCP_PROJECT_ID GCP_REGION GITOPS_PUSH_TOKEN)
            for var in "${required[@]}"; do
              if [ -z "${!var:-}" ]; then
                echo "Missing required env var: ${var}"
                exit 1
              fi
            done
      - run:
          name: Install gcloud + jq + skaffold
          command: |
            set -euo pipefail
            sudo apt-get update
            sudo apt-get install -y apt-transport-https ca-certificates curl gnupg jq
            if ! command -v gcloud >/dev/null 2>&1; then
              echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] http://packages.cloud.google.com/apt cloud-sdk main" | sudo tee /etc/apt/sources.list.d/google-cloud-sdk.list
              curl -fsSL https://packages.cloud.google.com/apt/doc/apt-key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/cloud.google.gpg
              sudo apt-get update
              sudo apt-get install -y google-cloud-cli
            fi
            if ! command -v skaffold >/dev/null 2>&1; then
              curl -Lo /tmp/skaffold https://storage.googleapis.com/skaffold/releases/latest/skaffold-linux-amd64
              chmod +x /tmp/skaffold
              sudo mv /tmp/skaffold /usr/local/bin/skaffold
            fi
      - run:
          name: Build and push images to Artifact Registry
          command: |
            set -euo pipefail
            export IMAGE_TAG="${CIRCLE_SHA1:0:12}"
            export REPO="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}"

            echo "${GOOGLE_CREDENTIALS}" > /tmp/gcp-credentials.json
            CRED_TYPE="$(jq -r '.type // empty' /tmp/gcp-credentials.json)"

            if [ "${CRED_TYPE}" = "service_account" ]; then
              gcloud auth activate-service-account --key-file=/tmp/gcp-credentials.json
            elif [ "${CRED_TYPE}" = "external_account" ]; then
              : "${CIRCLE_OIDC_TOKEN_V2:?CIRCLE_OIDC_TOKEN_V2 is required for external_account credentials}"
              echo "${CIRCLE_OIDC_TOKEN_V2}" > /tmp/oidc_token

              gcloud auth login --brief --cred-file=/tmp/gcp-credentials.json
            else
              echo "Unsupported GOOGLE_CREDENTIALS type: ${CRED_TYPE}"
              exit 1
            fi

            gcloud config set project "${GCP_PROJECT_ID}"
            gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" -q

            # CircleCI remote Docker does not always have QEMU binfmt configured.
            # Force amd64-only builds for CI to avoid arm64 exec-format failures.
            cp skaffold.yaml /tmp/skaffold.ci.yaml
            sed -i 's/platforms: \["linux\/amd64", "linux\/arm64"\]/platforms: ["linux\/amd64"]/g' /tmp/skaffold.ci.yaml

            skaffold build -f /tmp/skaffold.ci.yaml --default-repo="${REPO}" --tag="${IMAGE_TAG}" --push=true
      - run:
          name: Verify pushed images are present
          command: |
            set -euo pipefail
            gcloud artifacts docker images list "${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}" --include-tags --format='table(package,tags)' | sed -n '1,40p'
      - run:
          name: Commit and open PR for dev promotion
          command: |
            set -euo pipefail
            export IMAGE_TAG="${CIRCLE_SHA1:0:12}"
            export REPO_SLUG="${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}"
            export REMOTE_URL="https://x-access-token:${GITOPS_PUSH_TOKEN}@github.com/${REPO_SLUG}.git"

            git config user.email "ci-bot@users.noreply.github.com"
            git config user.name "circleci-bot"
            git remote set-url origin "${REMOTE_URL}"
            git fetch origin "${GITOPS_TARGET_BRANCH}"

            PERMISSIONS_JSON=$(curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GITOPS_PUSH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPO_SLUG}")

            CAN_PUSH=$(echo "${PERMISSIONS_JSON}" | jq -r '.permissions.push // false')
            if [ "${CAN_PUSH}" != "true" ]; then
              echo "GITOPS_PUSH_TOKEN cannot push to ${REPO_SLUG}. Ensure token has Contents: Read and write and repo access."
              exit 1
            fi

            create_promotion_pr() {
              local env="$1"
              local overlay_file="deploy/overlays/${env}/kustomization.yaml"
              local branch_name="ci/${env}-images-${IMAGE_TAG}"
              local pr_title="chore(gitops): promote ${env} images to ${IMAGE_TAG}"

              git checkout -B "${branch_name}" "origin/${GITOPS_TARGET_BRANCH}"
              sed -i "s/newTag: .*/newTag: ${IMAGE_TAG}/g" "${overlay_file}"

              if git diff --quiet -- "${overlay_file}"; then
                echo "No changes for ${env}; skipping PR."
                return
              fi

              git add "${overlay_file}"
              git commit -m "${pr_title}"
              git push -u origin "${branch_name}" --force-with-lease

              PR_BODY=$(jq -n \
                --arg title "${pr_title}" \
                --arg head "${branch_name}" \
                --arg base "${GITOPS_TARGET_BRANCH}" \
                --arg body "Automated PR from CircleCI. Updates ${env} overlay image tags to ${IMAGE_TAG}." \
                '{title:$title, head:$head, base:$base, body:$body}')

              HTTP_CODE=$(curl -sS -o "/tmp/pr-${env}.json" -w "%{http_code}" -X POST \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer ${GITOPS_PUSH_TOKEN}" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "https://api.github.com/repos/${REPO_SLUG}/pulls" \
                -d "${PR_BODY}")

              if [ "${HTTP_CODE}" = "201" ]; then
                echo "Created ${env} PR: $(jq -r '.html_url' "/tmp/pr-${env}.json")"
              elif [ "${HTTP_CODE}" = "422" ]; then
                echo "${env} PR already exists for branch ${branch_name}."
              else
                echo "Failed to create ${env} PR (HTTP ${HTTP_CODE})."
                cat "/tmp/pr-${env}.json"
                exit 1
              fi
            }

            create_promotion_pr dev

workflows:
  ci:
    jobs:
      - go-unit-tests
      - dotnet-unit-tests
      - kustomize-build

  main-build-and-gitops:
    jobs:
      - go-unit-tests:
          filters:
            branches:
              only: main
      - dotnet-unit-tests:
          filters:
            branches:
              only: main
      - kustomize-build:
          filters:
            branches:
              only: main
      - build-and-open-gitops-pr:
          requires:
            - go-unit-tests
            - dotnet-unit-tests
            - kustomize-build
          filters:
            branches:
              only: main
