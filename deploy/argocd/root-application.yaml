apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: online-boutique-root
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: online-boutique
  source:
    repoURL: https://github.com/Carshell/CodeX2026.git
    targetRevision: main
    path: deploy/argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
